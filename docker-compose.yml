services:

  eureka-server:
    build: ./Eureka
    container_name: eureka-server
    ports:
      - "8761:8761"

  ms-autenticacion:
    build: ./DFullS
    container_name: ms-autenticacion
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  ms-artistas:
    build: ./artistas
    container_name: ms-artistas
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  ms-localidades:
    build: ./localidades
    container_name: ms-localidades
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  ms-recintos:
    build: ./recintos
    container_name: ms-recintos
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  notificaciones:
    build: ./notificaciones
    container_name: notificaciones
    ports:
      - "8089:8089"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  promocion:
    build: ./promocion
    container_name: promocion
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  ms-eventos:
    build: ./eventos
    container_name: ms-eventos
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  ms-tickets:
    build: ./tickets
    container_name: ms-tickets
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  ms-reservas:
    build: ./reservas
    container_name: ms-reservas
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server
      - ms-autenticacion
      - ms-artistas
      - ms-localidades
      - ms-recintos
      - notificaciones
      - promocion
      - ms-eventos
      - ms-tickets
      - ms-reservas
