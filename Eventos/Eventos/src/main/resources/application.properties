spring.application.name=Eventos
server.port=8085

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/eventos_db
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes

logging.level.root=INFO

logging.level.com.example=DEBUG

logging.file.name=logs/Eventos.log

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

springdoc.hateoas.enabled=false

