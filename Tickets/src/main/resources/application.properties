spring.application.name=Tickets
server.port=8086

# ============================================================
#  SWAGGER / OPENAPI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.show-common-extensions=true

# ============================================================
#  DATABASE
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/tickets_db
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================================================
#  JWT
# ============================================================
jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes

# ============================================================
#  LOGGING
# ============================================================
logging.level.root=INFO
logging.level.com.example.Tickets=DEBUG
logging.file.name=logs/Tickets.log

# ============================================================
#  EUREKA
# ============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true