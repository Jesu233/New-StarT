spring.application.name=ms-localidades
# Puerto
server.port=8082

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/localidades_db
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes

# Logging
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.file.name=logs/ms-localidades.log

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true