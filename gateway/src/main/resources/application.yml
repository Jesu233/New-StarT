spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          enabled: true
      routes:
        - id: ms-autenticacion
          uri: lb://ms-autenticacion
          predicates:
            - Path=/api/v1/auth/**
        - id: ms-promociones
          uri: lb://promocion
          predicates:
            - Path=/api/promociones/**
        - id: ms-notificaciones
          uri: lb://notificaciones
          predicates:
            - Path=/api/v1/email/**
        - id: ms-eventos
          uri: lb://Eventos
          predicates:
            - Path=/api/v1/evento/**
        - id: ms-reservas
          uri: lb://Reservas
          predicates:
            - Path=/api/v1/reserva/**
        - id: ms-recintos
          uri: lb://ms-recintos
          predicates:
            - Path=/api/v1/recintos/**
        - id: ms-localidades
          uri: lb://ms-localidades
          predicates:
            - Path=/api/v1/localidades/**
        - id: ms-artistas
          uri: lb://ms-artistas
          predicates:
            - Path=/api/v1/artistas/**
        - id: ms-tickets
          uri: lb://Tickets
          predicates:
            - Path=/api/v1/tickets/**

server:
  port: 8090

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/